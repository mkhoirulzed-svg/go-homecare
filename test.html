<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Go Homecare</title>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #0d9488; /* Teal 600 */
      --primary-dark: #0f766e; /* Teal 700 */
      --primary-light: #ccfbf1; /* Teal 100 */
      --bg-color: #f8fafc; /* Slate 50 */
      --text-main: #0f172a; /* Slate 900 */
      --text-muted: #64748b; /* Slate 500 */
      --white: #ffffff;
      --shadow-sm: 0 2px 8px rgba(15, 23, 42, 0.08);
      --shadow-md: 0 8px 24px rgba(15, 23, 42, 0.12);
      --shadow-lg: 0 12px 32px rgba(13, 148, 136, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
    }

    /* Mobile Container Style */
    .app-container {
      width: 100%;
      max-width: 430px;
      background-color: var(--bg-color);
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    /* Hero Banner Section */
    .hero-banner {
      background: linear-gradient(160deg, var(--primary-dark) 0%, var(--primary) 100%);
      padding: 60px 32px 80px;
      border-bottom-left-radius: 32px;
      border-bottom-right-radius: 32px;
      color: var(--white);
      position: relative;
      overflow: hidden;
      animation: slideDown 0.8s ease-out;
    }

    .hero-banner::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 200px;
      height: 200px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
    }

    .hero-banner::after {
      content: '';
      position: absolute;
      bottom: 20px;
      left: -30px;
      width: 100px;
      height: 100px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
    }

    .app-logo {
      width: 56px;
      height: 56px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: var(--shadow-lg);
    }

    .app-logo svg {
      width: 32px;
      height: 32px;
      fill: var(--white);
    }

    .hero-title {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .hero-subtitle {
      font-size: 15px;
      opacity: 0.9;
      font-weight: 400;
      line-height: 1.5;
      max-width: 90%;
    }

    /* Main Content Card */
    .content-card {
      flex: 1;
      background: var(--white);
      margin: -40px 20px 20px;
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: var(--shadow-md);
      position: relative;
      z-index: 10;
      animation: fadeInUp 0.8s ease-out 0.3s backwards;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .illustration-box {
      width: 100%;
      height: 160px;
      background: var(--primary-light);
      border-radius: 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .illustration-box svg {
      width: 80%;
      height: 80%;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 8px;
      text-align: center;
    }

    .section-desc {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Buttons */
    .btn-google {
      width: 100%;
      padding: 16px;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      background: var(--white);
      font-size: 15px;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s ease;
      box-shadow: var(--shadow-sm);
    }

    .btn-google:hover {
      background: #f8fafc;
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .btn-google:active {
      transform: translateY(0);
    }

    .btn-google svg {
      width: 20px;
      height: 20px;
    }

    /* User Box (Logged In State) */
    .user-box {
      text-align: center;
      animation: fadeInUp 0.5s ease-out;
    }

    .user-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 16px;
      border: 4px solid var(--primary-light);
      object-fit: cover;
      box-shadow: var(--shadow-md);
    }

    .user-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 4px;
    }

    .user-email {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 24px;
      display: block;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-lg);
      margin-bottom: 12px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(13, 148, 136, 0.35);
    }

    .btn-logout {
      width: 100%;
      padding: 14px;
      border: 1px solid #fecaca;
      border-radius: 14px;
      background: #fff;
      color: #ef4444;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-logout:hover {
      background: #fef2f2;
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #94a3b8;
    }

    /* Utilities */
    .hidden {
      display: none !important;
    }

    /* Animations */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading Spinner */
    .loader {
      width: 24px;
      height: 24px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 50px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <div class="app-container">
    
    <!-- Hero Section -->
    <div class="hero-banner">
      <div class="app-logo">
        <svg viewBox="0 0 24 24">
          <path d="M19 8h-2V3a1 1 0 0 0-1-1H8a1 1 0 0 0-1 1v5H5a3 3 0 0 0-3 3v8a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3v-8a3 3 0 0 0-3-3zm-9-3h4v3h-4V5zm6 14H8v-2h8v2zm0-4H8v-2h8v2z"/>
        </svg>
      </div>
      <h1 class="hero-title">Go Homecare</h1>
      <p class="hero-subtitle">
        Layanan kesehatan rumah terpercaya. Mempertemukan pasien dengan perawat profesional secara mudah dan transparan.
      </p>
    </div>

    <!-- Main Content -->
    <div class="content-card" id="cardContent">
      
      <!-- Loading State Initial -->
      <div id="loaderBox" class="loader"></div>

      <!-- Logged Out State -->
      <div id="loginBox" class="hidden">
        <div class="illustration-box">
          <!-- Medical Illustration SVG -->
          <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <circle cx="100" cy="100" r="80" fill="#5eead4" opacity="0.3"/>
            <path d="M80,50 L120,50 L120,80 L150,80 L150,120 L120,120 L120,150 L80,150 L80,120 L50,120 L50,80 L80,80 Z" fill="#0d9488"/>
            <circle cx="100" cy="100" r="15" fill="#fff"/>
            <path d="M100,90 L100,110 M90,100 L110,100" stroke="#0d9488" stroke-width="4"/>
          </svg>
        </div>
        <h2 class="section-title">Selamat Datang</h2>
        <p class="section-desc">Masuk atau buat akun untuk mulai memesan layanan perawat homecare terbaik di sekitar Anda.</p>
        
        <button class="btn-google" onclick="loginGoogle()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24px" height="24px">
            <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
            <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
            <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
            <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
          </svg>
          Masuk dengan Google
        </button>
      </div>

      <!-- Logged In State -->
      <div id="userBox" class="user-box hidden">
        <img id="userAvatar" class="user-avatar" src="" alt="Avatar">
        <h2 class="user-name" id="userName"></h2>
        <small class="user-email" id="userEmail"></small>
        
        <button class="btn-primary" onclick="enterApp()">
          Mulai Konsultasi
        </button>
        
        <button class="btn-logout" onclick="logout()">
          Keluar
        </button>
      </div>

    </div>

    <div class="footer">
      © 2026 Go Homecare. All rights reserved.
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCTBaq4nzvolat37ivwPluP_fOmgoAvm_E",
      authDomain: "gocare-c94bc.firebaseapp.com",
      projectId: "gocare-c94bc",
      storageBucket: "gocare-c94bc.firebasestorage.app",
      messagingSenderId: "123940961680",
      appId: "1:123940961680:web:bb842fd8925e2432230715"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Tambahkan parameter untuk mendapatkan data profil yang lebih lengkap
    provider.setCustomParameters({ prompt: 'select_account' });

    // Elements
    const loaderBox = document.getElementById("loaderBox");
    const loginBox = document.getElementById("loginBox");
    const userBox = document.getElementById("userBox");

    window.loginGoogle = async function () {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;

        console.log("Login berhasil:", user);

        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          nama: user.displayName || "",
          email: user.email || "",
          foto: user.photoURL || "",
          role: "pasien",
          updatedAt: serverTimestamp()
        }, { merge: true });

        // Tidak perlu alert, UI akan berubah otomatis berkat onAuthStateChanged

      } catch (error) {
        console.error("Kode error:", error.code);
        console.error("Pesan error:", error.message);
        
        // Handle error popup close dengan elegan
        if (error.code !== 'auth/popup-closed-by-user') {
          alert("Login gagal: " + error.message);
        }
      }
    };

    window.logout = async function () {
      await signOut(auth);
    };

    window.enterApp = function() {
      alert("Mengarahkan ke halaman utama...");
      // window.location.href = "home.html";
    };

    // Listener state auth
    onAuthStateChanged(auth, (user) => {
      // Sembunyikan loader saat state auth sudah dideteksi
      loaderBox.classList.add("hidden");

      if (user) {
        loginBox.classList.add("hidden");
        userBox.classList.remove("hidden");

        document.getElementById("userName").textContent = user.displayName || "Pengguna";
        document.getElementById("userEmail").textContent = user.email;
        
        // Set avatar, gunakan placeholder jika tidak ada photoURL
        const avatarSrc = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || 'User')}&background=0d9488&color=fff&size=128`;
        document.getElementById("userAvatar").src = avatarSrc;

      } else {
        loginBox.classList.remove("hidden");
        userBox.classList.add("hidden");
      }
    });
  </script>

</body>
</html>
